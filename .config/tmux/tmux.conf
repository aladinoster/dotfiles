# ── General ───────────────────────────────────────────────────────────────────
set-option -g mode-keys vi
set-option -g history-limit 15000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Window naming ─────────────────────────────────────────────────────────────
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ── Keybindings ───────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Vi-style pane switching (overridden by vim-tmux-navigator when in vim)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Better yank
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Fuzzy session picker (prefix + O)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'

# Vim-tmux navigator (seamless pane/split switching with vim)
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text " #{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}"
set -g @catppuccin_window_current_text " #{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}"
set -g @catppuccin_status_left_separator '█'
set -g @catppuccin_status_right_separator '█'

# Statusbar modules
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# ── TPM bootstrap (keep at bottom) ────────────────────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
